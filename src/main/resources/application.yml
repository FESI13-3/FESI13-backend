spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

image:
  upload-dir: ${IMAGE_UPLOAD_DIR:./data/images}

admin:
  repair-secret: ${ADMIN_REPAIR_SECRET:}

server:
  port: 8080
  forward-headers-strategy: native

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:deadlinemate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop

jwt:
  secret: local-dev-secret-key-that-is-at-least-256-bits-long-for-hs256
  access-expiration: 3600000
  refresh-expiration: 604800000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:kakao-client-id}
    client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret}
    token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
  google:
    client-id: ${GOOGLE_CLIENT_ID:google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo

logging:
  level:
    com.fesi.deadlinemate.global.monitoring: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
