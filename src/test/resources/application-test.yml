spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

image:
  upload-dir: ./build/test-images

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
  access-expiration: 3600000
  refresh-expiration: 604800000

oauth:
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
