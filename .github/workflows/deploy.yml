name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --info
        env:
          SPRING_PROFILES_ACTIVE: test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fesi13-backend:latest
          no-cache: true

      - name: Build .env and deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/fesi13-backend:latest
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_IMAGE,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,DB_USERNAME,DB_PASSWORD,JWT_SECRET,JWT_ACCESS_EXPIRATION,JWT_REFRESH_EXPIRATION,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,ADMIN_REPAIR_SECRET
          script_stop: true
          script: |
            cd /home/ubuntu/app

            BASE_URL="https://${{ secrets.EC2_DOMAIN }}"

            # 값이 있는 변수만 .env에 기록 (없으면 docker-compose 기본값 사용)
            > .env
            [ -n "$DOCKER_IMAGE" ]           && echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> .env
            [ -n "$MYSQL_ROOT_PASSWORD" ]    && echo "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" >> .env
            [ -n "$MYSQL_DATABASE" ]         && echo "MYSQL_DATABASE=$MYSQL_DATABASE" >> .env
            [ -n "$DB_USERNAME" ]            && echo "DB_USERNAME=$DB_USERNAME" >> .env
            [ -n "$DB_PASSWORD" ]            && echo "DB_PASSWORD=$DB_PASSWORD" >> .env
            [ -n "$JWT_SECRET" ]             && echo "JWT_SECRET=$JWT_SECRET" >> .env
            [ -n "$JWT_ACCESS_EXPIRATION" ]  && echo "JWT_ACCESS_EXPIRATION=$JWT_ACCESS_EXPIRATION" >> .env
            [ -n "$JWT_REFRESH_EXPIRATION" ] && echo "JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION" >> .env
            [ -n "$KAKAO_CLIENT_ID" ]        && echo "KAKAO_CLIENT_ID=$KAKAO_CLIENT_ID" >> .env
            [ -n "$KAKAO_CLIENT_SECRET" ]    && echo "KAKAO_CLIENT_SECRET=$KAKAO_CLIENT_SECRET" >> .env
            [ -n "$GOOGLE_CLIENT_ID" ]       && echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
            [ -n "$GOOGLE_CLIENT_SECRET" ]   && echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env
            [ -n "$ADMIN_REPAIR_SECRET" ]    && echo "ADMIN_REPAIR_SECRET=$ADMIN_REPAIR_SECRET" >> .env

            docker compose up -d mysql
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app
            docker image prune -f

            # 기동 대기 후 상태 확인
            sleep 20
            echo "=== Container status ==="
            docker compose ps
            if docker compose ps | grep -E "app.*(Exit|Restarting)"; then
              echo "=== App failed to start. Logs ==="
              docker compose logs app --tail 30
              exit 1
            fi
            echo "Deployment successful."
